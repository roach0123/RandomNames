<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <button id="share-btn" class="share-button" onclick="copyShareLink()" title="Copy link with names" style="display:none">
            <span id="share-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
            </span>
        </button>

        <div id="name-form-section" style="display:none">
            <h2 class="form-title">Names</h2>
            <p class="form-subtitle">Enter names separated by commas or newlines</p>
            <textarea id="names-input" placeholder="Mickey Mouse, Donald Duck, Goofy, Minnie Mouse..."></textarea>
            <button class="button shuffle-button" onclick="submitNames()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                    <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
                </svg>
                Shuffle Names
            </button>
        </div>

        <div id="dashboard-section" style="display:none">
            <h1 id="greeting"></h1>
            <p id="time"></p>
            <hr class="card-divider">
            <div id="names"></div>
            <button class="button" onclick="refreshNames(); displayRandomQuote();">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
                </svg>
                Shuffle
            </button>
            <button class="button new-names-button" onclick="showNameForm()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                </svg>
                New Names
            </button>
        </div>
    </div>

    <div id="footer-text" style="display:block;visibility:hidden">
        <p id="quote"></p>
        <p id="quote-author"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
